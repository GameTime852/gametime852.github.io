<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Español Max - Ucz się hiszpańskiego</title>
    
    <!-- Ładowanie Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfiguracja Tailwind dla trybu "Max" -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#111827',
                        card: '#1f2937',
                        primary: '#8b5cf6', // Fioletowy Max
                        primaryHover: '#7c3aed',
                        success: '#22c55e',
                        danger: '#ef4444',
                        surface: '#374151'
                    },
                    fontFamily: {
                        sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Ładowanie React i Babel (pozwala na użycie JSX w jednym pliku bez kompilacji) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #111827; /* dark */
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            /* Zapobiega zaznaczaniu tekstu na elementach UI */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Przycisk 3D w stylu Duolingo */
        .btn-3d {
            transition: all 0.1s;
            position: relative;
        }
        .btn-3d:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-bottom: 4px; /* kompensacja wysokości marginesu */
        }
        
        .btn-3d:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Animacje wejścia */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Chowanie scrollbara, ale zostawienie funkcjonalności przewijania */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IKONY SVG ---
        const IconHeart = ({ className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={`${className} text-danger`}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
            </svg>
        );

        const IconFire = ({ className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={`${className} text-orange-500`}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.866 8.21 8.21 0 003 2.48z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z" />
            </svg>
        );

        const IconStar = ({ className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={`${className} text-yellow-400`}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
            </svg>
        );

        const IconCheck = ({ className = "w-8 h-8" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={3} stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        );

        const IconX = ({ className = "w-8 h-8" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={3} stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // --- BAZA WIEDZY (Lekcje) ---
        const COURSE_DATA = [
            {
                id: 1,
                title: "Przywitania",
                description: "Naucz się mówić cześć",
                questions: [
                    { type: 'select', prompt: 'Jak powiesz "Cześć"?', options: ['Adiós', 'Hola', 'Gracias', 'Por favor'], answer: 'Hola' },
                    { type: 'translate', prompt: 'Hola', options: ['Do widzenia', 'Proszę', 'Cześć', 'Dziękuję'], answer: 'Cześć' },
                    { type: 'select', prompt: 'Jak powiesz "Do widzenia"?', options: ['Hola', 'Bien', 'Adiós', 'Sí'], answer: 'Adiós' }
                ]
            },
            {
                id: 2,
                title: "Dobre maniery",
                description: "Proszę i dziękuję",
                questions: [
                    { type: 'select', prompt: 'Jak powiesz "Dziękuję"?', options: ['Por favor', 'Gracias', 'Perdón', 'De nada'], answer: 'Gracias' },
                    { type: 'select', prompt: 'Jak powiesz "Proszę" (gdy o coś prosisz)?', options: ['De nada', 'Bien', 'Gracias', 'Por favor'], answer: 'Por favor' },
                    { type: 'translate', prompt: 'De nada', options: ['Nie ma za co', 'Proszę bardzo', 'Przepraszam', 'Dziękuję'], answer: 'Nie ma za co' },
                    { type: 'translate', prompt: 'Gracias, adiós', options: ['Proszę, cześć', 'Dziękuję, do widzenia', 'Przepraszam, nie', 'Dobrze, dziękuję'], answer: 'Dziękuję, do widzenia' }
                ]
            },
            {
                id: 3,
                title: "Samopoczucie",
                description: "Pytanie co słychać",
                questions: [
                    { type: 'select', prompt: 'Jak zapytasz "Jak się masz?"', options: ['¿Cómo te llamas?', '¿Cómo estás?', '¿Qué tal?', 'Ambas opcje (B i C)'], answer: 'Ambas opcje (B i C)' },
                    { type: 'translate', prompt: 'Estoy bien', options: ['Jestem zmęczony', 'Mam się dobrze', 'Jestem chory', 'Nazywam się'], answer: 'Mam się dobrze' },
                    { type: 'select', prompt: 'Jak powiesz "Źle"?', options: ['Bien', 'Mal', 'Más o menos', 'Sí'], answer: 'Mal' },
                    { type: 'translate', prompt: 'Hola, ¿cómo estás?', options: ['Cześć, jak się masz?', 'Cześć, jak masz na imię?', 'Dzień dobry, dziękuję.', 'Do widzenia, dobrze.'], answer: 'Cześć, jak się masz?' }
                ]
            },
            {
                id: 4,
                title: "Pory dnia",
                description: "Dzień dobry i dobranoc",
                questions: [
                    { type: 'select', prompt: '"Dzień dobry" (rano) to:', options: ['Buenas tardes', 'Buenos días', 'Buenas noches', 'Hola'], answer: 'Buenos días' },
                    { type: 'select', prompt: '"Dobry wieczór / Dobranoc" to:', options: ['Buenas noches', 'Buenos días', 'Adiós', 'Buenas tardes'], answer: 'Buenas noches' },
                    { type: 'translate', prompt: 'Buenos días, ¿cómo estás?', options: ['Dzień dobry, jak się masz?', 'Dobranoc, jak się masz?', 'Cześć, dziękuję.', 'Do widzenia, dobrze.'], answer: 'Dzień dobry, jak się masz?' }
                ]
            },
            {
                id: 5,
                title: "Pierwsza rozmowa",
                description: "Połącz wszystko co umiesz!",
                questions: [
                    { type: 'select', prompt: 'Jak zapytasz "Jak masz na imię?"', options: ['¿Cómo estás?', '¿Qué tal?', '¿Cómo te llamas?', '¿Y tú?'], answer: '¿Cómo te llamas?' },
                    { type: 'translate', prompt: 'Me llamo...', options: ['Mam się...', 'Nazywam się...', 'Jestem z...', 'Lubię...'], answer: 'Nazywam się...' },
                    { type: 'translate', prompt: 'Mucho gusto', options: ['Bardzo dobrze', 'Bardzo źle', 'Miło mi', 'Dziękuję bardzo'], answer: 'Miło mi' },
                    { type: 'translate', prompt: '- Hola. - Buenos días. ¿Cómo estás?', options: ['- Cześć. - Dobranoc. Jak się masz?', '- Cześć. - Dzień dobry. Jak się masz?', '- Do widzenia. - Cześć. Co robisz?', '- Proszę. - Dziękuję. Jak się masz?'], answer: '- Cześć. - Dzień dobry. Jak się masz?' }
                ]
            }
        ];

        // --- GŁÓWNY KOMPONENT APLIKACJI ---
        const App = () => {
            // Stan aplikacji
            const [currentView, setCurrentView] = useState('home'); // 'home', 'lesson', 'summary'
            const [activeLessonId, setActiveLessonId] = useState(null);
            const [questionIndex, setQuestionIndex] = useState(0);
            
            // Postęp użytkownika (ładowany z localStorage)
            const [progress, setProgress] = useState(() => {
                const saved = localStorage.getItem('espanol_max_progress');
                return saved ? JSON.parse(saved) : { xp: 0, streak: 1, completedLessons: [], lastPlayed: new Date().toDateString() };
            });
            const [lives, setLives] = useState(5);

            // Stan pojedynczego pytania
            const [selectedOption, setSelectedOption] = useState(null);
            const [isChecking, setIsChecking] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            // Zapisywanie postępu
            useEffect(() => {
                localStorage.setItem('espanol_max_progress', JSON.stringify(progress));
            }, [progress]);

            // Odnowienie żyć codziennie / Zarządzanie streakiem
            useEffect(() => {
                const today = new Date().toDateString();
                if (progress.lastPlayed !== today) {
                    setLives(5);
                    // Prosta logika streaku - jeśli nie grał wczoraj, reset (tu uproszczone, po prostu utrzymujemy jeśli wrócił)
                    setProgress(p => ({ ...p, lastPlayed: today }));
                }
            }, []);

            // Nawigacja
            const startLesson = (id) => {
                if (lives <= 0) {
                    alert("Nie masz już żyć! Odczekaj chwilę lub wróć jutro.");
                    return;
                }
                setActiveLessonId(id);
                setQuestionIndex(0);
                setSelectedOption(null);
                setIsChecking(false);
                setCurrentView('lesson');
            };

            const goHome = () => setCurrentView('home');

            // Logika lekcji
            const currentLesson = COURSE_DATA.find(l => l.id === activeLessonId);
            const currentQuestion = currentLesson?.questions[questionIndex];

            const checkAnswer = () => {
                if (!selectedOption) return;
                
                const correct = selectedOption === currentQuestion.answer;
                setIsCorrect(correct);
                setIsChecking(true);

                if (!correct) {
                    setLives(l => Math.max(0, l - 1));
                }
            };

            const nextQuestion = () => {
                setIsChecking(false);
                setSelectedOption(null);

                if (lives === 0 && !isCorrect) {
                    // Przegrana
                    setCurrentView('home');
                    return;
                }

                if (questionIndex < currentLesson.questions.length - 1) {
                    setQuestionIndex(q => q + 1);
                } else {
                    // Koniec lekcji - sukces
                    completeLesson();
                }
            };

            const completeLesson = () => {
                const xpEarned = 15;
                setProgress(p => {
                    const newCompleted = p.completedLessons.includes(activeLessonId) 
                        ? p.completedLessons 
                        : [...p.completedLessons, activeLessonId];
                    return {
                        ...p,
                        xp: p.xp + xpEarned,
                        completedLessons: newCompleted
                    };
                });
                setCurrentView('summary');
            };

            // --- WIDOKI (Sub-komponenty renderowane warunkowo) ---

            // Widok GŁÓWNY (Ścieżka)
            if (currentView === 'home') {
                return (
                    <div className="flex flex-col h-screen max-w-md mx-auto bg-dark shadow-2xl overflow-hidden relative">
                        {/* Header Stats */}
                        <header className="flex justify-between items-center p-4 border-b border-gray-800 bg-card sticky top-0 z-10">
                            <div className="flex items-center font-bold text-lg gap-1">
                                <IconHeart /> <span className="text-white">{lives}</span>
                            </div>
                            <div className="flex items-center font-bold text-lg gap-1">
                                <IconFire /> <span className="text-white">{progress.streak}</span>
                            </div>
                            <div className="flex items-center font-bold text-lg gap-1">
                                <IconStar /> <span className="text-white">{progress.xp}</span>
                            </div>
                        </header>

                        {/* Główna ścieżka scrollowana */}
                        <div className="flex-1 overflow-y-auto no-scrollbar p-6 pb-24 space-y-10">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-purple-400 mb-2">Español Max</h1>
                                <p className="text-gray-400">Twoja droga do hiszpańskiego</p>
                            </div>

                            {COURSE_DATA.map((lesson, index) => {
                                const isCompleted = progress.completedLessons.includes(lesson.id);
                                const isUnlocked = index === 0 || progress.completedLessons.includes(COURSE_DATA[index - 1]?.id);
                                
                                // Kalkulacja przesunięcia (wężyk)
                                const offset = Math.sin(index * 1.5) * 40; 

                                return (
                                    <div key={lesson.id} className="relative flex flex-col items-center group" style={{ transform: `translateX(${offset}px)` }}>
                                        {/* Dymek z opisem (widoczny nad aktualną/odblokowaną lekcją) */}
                                        {isUnlocked && !isCompleted && (
                                            <div className="absolute -top-14 bg-white text-black font-bold py-2 px-4 rounded-xl shadow-lg whitespace-nowrap z-10 animate-pulse">
                                                {lesson.title}
                                                <div className="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-8 border-r-8 border-t-8 border-transparent border-t-white"></div>
                                            </div>
                                        )}

                                        {/* Przycisk lekcji */}
                                        <button 
                                            onClick={() => startLesson(lesson.id)}
                                            disabled={!isUnlocked}
                                            className={`
                                                relative w-20 h-20 rounded-full flex items-center justify-center btn-3d
                                                border-b-[6px] transition-all
                                                ${isCompleted ? 'bg-primary border-primaryHover text-white' : 
                                                  isUnlocked ? 'bg-primary border-primaryHover text-white ring-4 ring-primary ring-opacity-30' : 
                                                  'bg-surface border-gray-600 text-gray-500 opacity-60'}
                                            `}
                                        >
                                            {isCompleted ? <IconStar className="w-10 h-10 text-yellow-300" /> : <IconStar className={`w-8 h-8 ${isUnlocked ? 'text-white' : 'text-gray-500'}`} />}
                                        </button>
                                        <span className={`mt-3 font-bold ${isUnlocked ? 'text-white' : 'text-gray-500'}`}>{lesson.title}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            // Widok LEKCJI
            if (currentView === 'lesson') {
                const progressPercent = ((questionIndex) / currentLesson.questions.length) * 100;

                return (
                    <div className="flex flex-col h-screen max-w-md mx-auto bg-dark">
                        {/* Pasek postępu */}
                        <div className="flex items-center p-4 gap-4">
                            <button onClick={goHome} className="text-gray-400 hover:text-white transition">
                                <IconX className="w-6 h-6" />
                            </button>
                            <div className="flex-1 bg-surface h-4 rounded-full overflow-hidden">
                                <div 
                                    className="h-full bg-success transition-all duration-500 ease-out rounded-full"
                                    style={{ width: `${progressPercent}%` }}
                                ></div>
                            </div>
                            <div className="flex items-center font-bold text-danger">
                                <IconHeart className="w-6 h-6 mr-1" /> {lives}
                            </div>
                        </div>

                        {/* Główna treść pytania */}
                        <div className="flex-1 overflow-y-auto p-6 flex flex-col justify-center">
                            <h2 className="text-2xl font-bold mb-8 text-center leading-tight">
                                {currentQuestion.prompt}
                            </h2>

                            <div className="grid grid-cols-1 gap-4">
                                {currentQuestion.options.map((option, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => !isChecking && setSelectedOption(option)}
                                        disabled={isChecking}
                                        className={`
                                            p-4 rounded-2xl border-2 text-left font-semibold text-lg transition-all btn-3d border-b-4
                                            ${selectedOption === option && !isChecking ? 'border-primary bg-primary bg-opacity-10 text-primary' : ''}
                                            ${selectedOption !== option && !isChecking ? 'border-surface bg-surface text-white hover:border-gray-500' : ''}
                                            ${isChecking && selectedOption === option && isCorrect ? 'border-success bg-success bg-opacity-20 text-success' : ''}
                                            ${isChecking && selectedOption === option && !isCorrect ? 'border-danger bg-danger bg-opacity-20 text-danger' : ''}
                                            ${isChecking && selectedOption !== option ? 'border-surface bg-surface text-gray-500 opacity-50' : ''}
                                        `}
                                    >
                                        {option}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Pasek dolny (Check / Continue) */}
                        <div className="p-4 border-t border-gray-800">
                            {!isChecking ? (
                                <button 
                                    onClick={checkAnswer}
                                    disabled={!selectedOption}
                                    className={`w-full py-4 rounded-2xl font-bold text-lg btn-3d border-b-4 text-white uppercase tracking-wider
                                        ${selectedOption ? 'bg-primary border-primaryHover hover:bg-purple-600' : 'bg-surface border-gray-600 text-gray-400'}
                                    `}
                                >
                                    Sprawdź
                                </button>
                            ) : (
                                <div className={`fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 rounded-t-3xl animate-slide-up flex flex-col gap-4
                                    ${isCorrect ? 'bg-success bg-opacity-20 backdrop-blur-md border-t-2 border-success' : 'bg-danger bg-opacity-20 backdrop-blur-md border-t-2 border-danger'}
                                `}>
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-full ${isCorrect ? 'bg-success text-white' : 'bg-danger text-white'}`}>
                                            {isCorrect ? <IconCheck /> : <IconX />}
                                        </div>
                                        <h3 className={`text-2xl font-black ${isCorrect ? 'text-success' : 'text-danger'}`}>
                                            {isCorrect ? 'Znakomicie!' : 'Niestety nie.'}
                                        </h3>
                                    </div>
                                    {!isCorrect && (
                                        <p className="text-white">Poprawna odpowiedź: <span className="font-bold">{currentQuestion.answer}</span></p>
                                    )}
                                    <button 
                                        onClick={nextQuestion}
                                        className={`w-full py-4 rounded-2xl font-bold text-lg btn-3d border-b-4 text-white uppercase tracking-wider
                                            ${isCorrect ? 'bg-success border-green-700 hover:bg-green-600' : 'bg-danger border-red-700 hover:bg-red-600'}
                                        `}
                                    >
                                        Dalej
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Widok PODSUMOWANIA (Koniec lekcji)
            if (currentView === 'summary') {
                return (
                    <div className="flex flex-col h-screen max-w-md mx-auto bg-dark p-6 justify-center items-center text-center">
                        <div className="bg-card p-8 rounded-3xl w-full border-2 border-primary shadow-[0_0_40px_rgba(139,92,246,0.3)] animate-slide-up">
                            <IconStar className="w-24 h-24 mx-auto text-yellow-400 mb-6" />
                            <h2 className="text-3xl font-extrabold mb-2 text-white">Lekcja ukończona!</h2>
                            <p className="text-gray-400 mb-8">Świetna robota, oby tak dalej.</p>
                            
                            <div className="flex justify-center gap-8 mb-8">
                                <div className="flex flex-col items-center">
                                    <span className="text-sm text-gray-400 uppercase font-bold">Zdobyte XP</span>
                                    <span className="text-2xl font-bold text-yellow-400">+15</span>
                                </div>
                                <div className="flex flex-col items-center">
                                    <span className="text-sm text-gray-400 uppercase font-bold">Skuteczność</span>
                                    <span className="text-2xl font-bold text-success">100%</span>
                                </div>
                            </div>

                            <button 
                                onClick={goHome}
                                className="w-full py-4 rounded-2xl font-bold text-lg btn-3d border-b-4 text-white uppercase tracking-wider bg-primary border-primaryHover hover:bg-purple-600"
                            >
                                Kontynuuj
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
