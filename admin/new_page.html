<!DOCTYPE html>
<html>
<head>
<title>Portfolio JĆ - ADMIN</title>

<link rel="stylesheet" href="../style.css">

</head>
<body>

<div class="banner">
    <div class="icon-box">
        <a href="../index.html"><img src="../img/back.png" alt="ikona" width="180"></a>
    </div>
    <div class="text-box">
        <div class="header">Portfolio JĆ</div>
        <div class="header2">ADMIN</div>
    </div>
</div>

<br/><br/></br/><br/>
<div class="admin-container">
    <div class="new-page-container">
    <div class="login-box">
        <label for="name">Nazwa podstrony:</label>
        <input type="text" id="name" name="name" required>
        <label for="description">Opis podstrony:</label>
        <input type="text" id="description" name="description" required>
        <br/><br/>
        <button id="zapisz-btn">Stwórz nową podstrone</button>
    </div>
    </div>
    <div class="new-page-distance"></div>
    <div class="new-page-container">
    <div class="login-box">
        <label for="content">Zawartość podstrony:</label>
        <br/>
        <textarea class="textarea" id="content" name="content"></textarea>
    </div>
    </div>
</div>

<div id="komunikat-sukces" style="display: none; color: green; margin-top: 15px; font-weight: bold;">Wpis został pomyślnie opublikowany na stronie!</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDZDPMe2dNb1dg5dszVrYYtstuW7tlZu5M",
  authDomain: "portfolio-jc-947e0.firebaseapp.com",
  projectId: "portfolio-jc-947e0",
  storageBucket: "portfolio-jc-947e0.firebasestorage.app",
  messagingSenderId: "202317160328",
  appId: "1:202317160328:web:2ad8398a12c533c37aa43d"
};

const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

// Reakcja na kliknięcie przycisku "Opublikuj wpis"
document.getElementById('zapisz-btn').addEventListener('click', () => {
    const tytul = document.getElementById('name').value;
    const opis = document.getElementById('description').value;    
    const tresc = document.getElementById('content').value;

    if(tytul === "" || tresc === "") {
        alert("Musisz wypełnić tytuł i treść!");
        return;
    }

    // Wybieramy miejsce "wpisy" w bazie i generujemy unikalne ID posta (push)
    const wpisyRef = ref(db, 'wpisy');
    const nowyWpisRef = push(wpisyRef);

    // Zapisujemy dane
    set(nowyWpisRef, {
        tytul: tytul,
        opis: opis,
        tresc: tresc,
        data: Date.now() // Zapisujemy dokładny czas, żeby potem sortować od najnowszych
    }).then(() => {
        // Jeśli się uda, czyścimy pola i pokazujemy komunikat
        document.getElementById('komunikat-sukces').style.display = 'block';
        document.getElementById('name').value = '';
        document.getElementById('description').value = '';
        document.getElementById('content').value = '';
        setTimeout(() => { document.getElementById('komunikat-sukces').style.display = 'none'; }, 3000);
    }).catch((error) => {
        console.error(error);
        alert("Wystąpił błąd podczas zapisywania do bazy danych.");
    });
});

</script>

</body>
</html>
