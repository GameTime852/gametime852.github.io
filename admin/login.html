<!DOCTYPE html>
<html>
<head>
<title>Portfolio JĆ - ADMIN</title>
<link rel="stylesheet" href="../style.css">

<style>
    .form-container {
        display: flex;
        justify-content: center; /* Wyśrodkowanie w poziomie */
        margin-top: 80px; /* Odstęp od górnego banera */
    }

    form {
        padding: 40px;
        border-radius: 10px; /* Zaokrąglone rogi */
        text-align: center; /* Wyśrodkowanie tekstu wewnątrz */
        border: #000000 2px solid; /* Czarne obramowanie */
    }

    /* Style dla pól tekstowych i przycisku, żeby lepiej wyglądały */
    form label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 20px;
    }

    form input[type="text"],
    form input[type="password"] {
        width: 90%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 20px;
    }

    form input[type="submit"] {
        padding: 10px 20px;
        background-color: #f0f0f0;
        color: rgb(0, 0, 0);
        font-weight: bold;

        border: #000000 2px solid; /* Czarne obramowanie */
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    form input[type="submit"]:hover {
        background-color: #000000; /* Zmiana koloru po najechaniu myszką */
        color: #ffffff;
    }
</style>

</head>
<body>

<div class="banner">
    <div class="icon-box">
        <a href="../index.html"><img src="../img/back.png" alt="ikona" width="180"></a>
    </div>
    <div class="text-box">
        <div class="header">Portfolio JĆ - ADMIN Login</div>
    </div>
</div>

<div class="form-container">
    <form onsubmit="sprawdzLogowanie(event)">

        <label for="username">Nazwa użytkownika:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Hasło:</label>
        <input type="password" id="password" name="password" required>

        <input type="submit" value="Zaloguj się">

    </form>
</div>

<script>
function sprawdzLogowanie(event) {
    // Zatrzymujemy domyślne odświeżanie strony
    event.preventDefault(); 

    // Pobieramy wpisane dane
    var login = document.getElementById("username").value;
    var haslo = document.getElementById("password").value;

    // Sprawdzamy czy dane to admin / password
    if (login === "admin" && haslo === "password") {
        // Jeśli tak, przenosimy do admin.html
        window.location.href = "admin.html";
    } else {
        // Jeśli nie, wyświetlamy błąd
        alert("Błędna nazwa użytkownika lub hasło!");
    }
}
</script>

</body>
</html>
