<!DOCTYPE html>
<html>
<head>
<title>Portfolio JĆ - ADMIN</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="banner">
    <div class="icon-box">
        <a href="../index.html"><img src="../img/back.png" alt="ikona" width="180"></a>
    </div>
    <div class="text-box">
        <div class="header">Portfolio JĆ - ADMIN Login</div>
    </div>
</div>

<div class="form-login">
<form onsubmit="sprawdzLogowanie(event)">
    


    <label class="form-label" for="username">Nazwa użytkownika:</label>
    <input class="form-input" type="text" id="username" name="username" required>
    <br>

    <label class="form-label" for="password">Hasło:</label>
    <input class="form-input" type="password" id="password" name="password" required>
    <br>

    <input class="form-submit" type="submit" value="Zaloguj się">



</form>
</div>
<script>
function sprawdzLogowanie(event) {
    // Zatrzymujemy domyślne wysyłanie formularza
    event.preventDefault(); 

    // Pobieramy wpisane dane
    var login = document.getElementById("username").value;
    var haslo = document.getElementById("password").value;

    // Sprawdzamy czy dane to admin / password
    if (login === "admin" && haslo === "password") {
        // Jeśli tak, przenosimy do admin.html
        window.location.href = "admin.html";
    } else {
        // Jeśli nie, wyświetlamy błąd
        alert("Błędna nazwa użytkownika lub hasło!");
    }
}
</script>

</body>
</html>
