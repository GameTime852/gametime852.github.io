<!DOCTYPE html>
<html>
<head>
<title>Portfolio JĆ - ADMIN</title>
<link rel="stylesheet" href="../style.css">

<style>
    
</style>

</head>
<body>

<div class="banner">
    <div class="icon-box">
        <a href="../index.html"><img src="../img/back.png" alt="ikona" width="180"></a>
    </div>
    <div class="text-box">
        <div class="header">Portfolio JĆ - ADMIN Login</div>
    </div>
</div>

<div id="komunikat-bledu"></div>

<div class="form-container">
    <div class="login-box">
        <label for="username">Nazwa użytkownika:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Hasło:</label>
        <input type="password" id="password" name="password" required>

        <div class="show-password-container">
            <input type="checkbox" id="show-password" onclick="pokazUkryjHaslo()">
            <label for="show-password">Pokaż hasło</label>
        </div>
        <br/>
        <button onclick="sprawdzLogowanie()">Zaloguj się</button>

    </div>
</div>

<script>
// Funkcja od logowania
function sprawdzLogowanie() {
    var login = document.getElementById("username").value;
    var haslo = document.getElementById("password").value;
    var poleBledu = document.getElementById("komunikat-bledu");

    if (login === "admin" && haslo === "password") {
        poleBledu.style.display = "none";
        window.location.href = "admin.html";
    } else {
        poleBledu.innerText = "Błędna nazwa użytkownika lub hasło!";
        poleBledu.style.display = "block";
    }
}

// Funkcja od pokazywania/ukrywania hasła
function pokazUkryjHaslo() {
    var poleHasla = document.getElementById("password");
    // Jeśli typ to password, zmień na tekst. Jeśli nie, wróć do password.
    if (poleHasla.type === "password") {
        poleHasla.type = "text";
    } else {
        poleHasla.type = "password";
    }
}

// Opcjonalnie: Umożliwia logowanie klawiszem "Enter" na klawiaturze
document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        sprawdzLogowanie();
    }
});
</script>

</body>
</html>
